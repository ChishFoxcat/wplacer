<!DOCTYPE html>
<html>
<head>
    <title>wplacer</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <img src="icons/favicon-32x32.png" class="logo">
        <h3>wplacer</h3>
    </div>
    <div class="content">
        <div class="settings">
            <label for="port">服务器端口:</label>
            <input type="number" id="port" min="1" max="65535" value="80">
            <button id="saveSettingsBtn">保存</button>
        </div>
        <p id="status">准备好了, Tokens 准备自动发送</p>
        <button id="sendCookieBtn">手动添加/更新用户</button>
        <button id="logoutBtn" class="destructive">快速注销</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
